<span class="inline-flex items-center gap-0.5 whitespace-nowrap" aria-label="Rating {{ rating() }} out of 5">
  @for (star of stars; track star) {
    <span class="text-xl leading-none" [ngClass]="isFilled(star) ? 'text-yellow-500' : 'text-slate-300 dark:text-violet-900'">&#9733;</span>
  }
  <span class="ml-2 font-bold text-slate-950 dark:text-violet-50">{{ rating().toFixed(1) }}</span>
</span>
