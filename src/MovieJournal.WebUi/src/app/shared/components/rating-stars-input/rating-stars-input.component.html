<div class="inline-flex items-center gap-1" role="radiogroup" aria-label="Review rating">
  @for (star of stars; track star) {
    <button
      type="button"
      class="grid size-10 place-items-center rounded-md border bg-white text-2xl leading-none transition focus:outline-none focus:ring-4 focus:ring-violet-600/20 disabled:cursor-not-allowed disabled:opacity-60 dark:bg-[#211a33]"
      [ngClass]="
        isFilled(star)
          ? 'border-yellow-400 text-yellow-500'
          : 'border-slate-200 text-slate-300 dark:border-violet-900 dark:text-violet-900'
      "
      [disabled]="disabled()"
      [attr.aria-checked]="rating() === star"
      role="radio"
      (click)="selectRating(star)"
    >
      &#9733;
    </button>
  }
</div>
