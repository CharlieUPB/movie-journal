<form class="grid gap-3 rounded-lg border border-violet-100 bg-white p-4 dark:border-violet-900/70 dark:bg-[#211a33]" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <label class="grid gap-2 font-bold text-slate-950 dark:text-violet-50">
    <span>Add a comment</span>
    <textarea class="min-h-24 w-full resize-y rounded-md border border-slate-200 bg-white px-4 py-3 text-slate-950 outline-none transition focus:border-violet-600 focus:ring-4 focus:ring-violet-600/15 dark:border-violet-900 dark:bg-[#171323] dark:text-violet-50 dark:placeholder:text-violet-200/50" formControlName="content" rows="3" maxlength="500" placeholder="Share your thoughts..."></textarea>
  </label>

  <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    @if (showError()) {
      <p class="m-0 text-sm font-semibold text-rose-600 dark:text-rose-400">
        @if (content.hasError('required')) {
          Comment is required.
        } @else {
          Comments can be 500 characters max.
        }
      </p>
    } @else {
      <span class="text-sm text-slate-500 dark:text-violet-200/80">{{ content.value.length }} / 500</span>
    }

    <button type="submit" class="inline-flex min-h-10 items-center justify-center rounded-md bg-gradient-to-br from-violet-600 to-violet-700 px-4 py-2 font-extrabold text-white transition hover:from-violet-700 hover:to-violet-600 disabled:cursor-not-allowed disabled:opacity-60" [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Submitting...' : 'Submit Comment' }}
    </button>
  </div>
</form>
