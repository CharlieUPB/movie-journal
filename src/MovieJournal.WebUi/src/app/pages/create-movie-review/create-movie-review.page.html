<section class="grid gap-5">
  <header class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
    <div>
      <p class="mb-2 text-xs font-black uppercase tracking-wider text-violet-700 dark:text-violet-300">Create Review</p>
      <h1 class="m-0 max-w-3xl text-3xl font-black leading-tight text-slate-950 dark:text-violet-50 sm:text-4xl">Start a movie review.</h1>
      <p class="mt-3 max-w-2xl text-slate-500 dark:text-violet-200/80">Save it privately as a draft or publish it when it is ready.</p>
    </div>
    <a class="inline-flex min-h-11 items-center justify-center rounded-md border border-violet-500 px-4 py-2 font-extrabold text-violet-700 no-underline transition hover:bg-violet-50 dark:border-violet-400 dark:text-violet-200 dark:hover:bg-violet-950/50" routerLink="/movie-reviews/my">My Reviews</a>
  </header>

  @if (errorMessage()) {
    <app-state-message kind="error" title="Review could not be saved" [message]="errorMessage() ?? ''" />
  }

  <section class="rounded-lg border border-violet-100 bg-white p-4 shadow-soft dark:border-violet-900/70 dark:bg-[#171323] dark:shadow-soft-dark sm:p-6">
    <app-review-form
      mode="create"
      [isSubmitting]="isSaving()"
      (saveDraft)="saveDraft($event)"
      (saveAndPublish)="saveAndPublish($event)"
    />
  </section>
</section>
